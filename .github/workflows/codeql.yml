name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "33 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze-csharp:
    name: Analyze C#
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual
          dependency-caching: true

      - name: Restore plugin for Jellyfin 10.10
        working-directory: jellyfin-plugin
        run: dotnet restore -p:JellyfinVersion=10.10.7 -p:TargetFramework=net8.0

      - name: Build plugin for Jellyfin 10.10
        working-directory: jellyfin-plugin
        run: dotnet build -c Release --no-restore -p:JellyfinVersion=10.10.7 -p:TargetFramework=net8.0

      - name: Restore plugin for Jellyfin 10.11
        working-directory: jellyfin-plugin
        run: dotnet restore -p:JellyfinVersion=10.11.8 -p:TargetFramework=net9.0

      - name: Build plugin for Jellyfin 10.11
        working-directory: jellyfin-plugin
        run: dotnet build -c Release --no-restore -p:JellyfinVersion=10.11.8 -p:TargetFramework=net9.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"

  analyze-python:
    name: Analyze Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          dependency-caching: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
