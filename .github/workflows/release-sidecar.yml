name: Release sidecar image

# Publishes the sidecar Docker image to GHCR. Triggered by the same v*.*.* tags
# that drive plugin releases (see release-plugin.yml). The plugin DLL and the
# sidecar image share a tag — that's the lockstep half of plugin↔sidecar
# compatibility. The runtime handshake (sidecar /api/version vs. inject.js
# EXPECTED_API_VERSION) is the loud-failure half.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)publish, e.g. v0.1.0"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push sidecar image
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          MINOR="${VERSION%.*}"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "minor=$MINOR"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-sidecar" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sidecar/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ steps.tag.outputs.version }}
            ${{ steps.img.outputs.name }}:${{ steps.tag.outputs.minor }}
            ${{ steps.img.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
