name: Build plugin

on:
  push:
    branches: [main]
    paths:
      - "jellyfin-plugin/**"
      - ".github/workflows/build-plugin.yml"
  pull_request:
    paths:
      - "jellyfin-plugin/**"
      - ".github/workflows/build-plugin.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Jellyfin ${{ matrix.jellyfin }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add a row here when supporting a new Jellyfin minor.
        # `dotnet` and `target_framework` must match the .NET runtime Jellyfin ships with
        # for that version (10.10.x → .NET 8, 10.11.x → .NET 9).
        include:
          - jellyfin: "10.10.7"
            dotnet: "8.0.x"
            target_framework: "net8.0"
            target_abi: "10.10.0.0"
          - jellyfin: "10.11.8"
            dotnet: "9.0.x"
            target_framework: "net9.0"
            target_abi: "10.11.0.0"
    defaults:
      run:
        working-directory: jellyfin-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore -p:JellyfinVersion=${{ matrix.jellyfin }} -p:TargetFramework=${{ matrix.target_framework }}

      - name: Build
        run: dotnet build -c Release --no-restore -p:JellyfinVersion=${{ matrix.jellyfin }} -p:TargetFramework=${{ matrix.target_framework }}

      - name: Publish
        run: dotnet publish -c Release --no-build -p:JellyfinVersion=${{ matrix.jellyfin }} -p:TargetFramework=${{ matrix.target_framework }} -o publish

      - name: Verify DLL produced
        run: test -f publish/Jellyfin.Plugin.JellyGrab.dll

      - name: Package
        run: |
          cd publish
          zip -j "../jellygrab-jellyfin-${{ matrix.jellyfin }}.zip" Jellyfin.Plugin.JellyGrab.dll

      - uses: actions/upload-artifact@v4
        with:
          name: jellygrab-jellyfin-${{ matrix.jellyfin }}
          path: jellyfin-plugin/jellygrab-jellyfin-${{ matrix.jellyfin }}.zip
          if-no-files-found: error
