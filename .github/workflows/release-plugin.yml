name: Release plugin

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release, e.g. v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }} (Jellyfin ${{ matrix.jellyfin }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Mirror build-plugin.yml — keep these in sync.
        include:
          - jellyfin: "10.10.7"
            dotnet: "8.0.x"
            target_framework: "net8.0"
            target_abi: "10.10.0.0"
          - jellyfin: "10.11.8"
            dotnet: "9.0.x"
            target_framework: "net9.0"
            target_abi: "10.11.0.0"
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "assembly_version=${VERSION}.0"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Package
        id: pkg
        run: |
          scripts/package-plugin.sh \
            "${{ matrix.jellyfin }}" \
            "${{ matrix.target_framework }}" \
            "${{ steps.tag.outputs.version }}" \
            jellyfin-plugin
          ZIP_NAME="jellygrab-jellyfin-${{ matrix.jellyfin }}.zip"
          {
            echo "zip_name=$ZIP_NAME"
            echo "zip_path=jellyfin-plugin/$ZIP_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: ${{ steps.pkg.outputs.zip_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
