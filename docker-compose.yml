services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.8
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - ${HOST_MEDIA_DIR:-./media}:/media
      # JellyGrab plugin DLL is copied into ./jellyfin/config/plugins/JellyGrab_0.1.0/
      # by ./install-plugin.sh and picked up via the /config bind-mount above.
    networks:
      - jellygrab-net

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: jellygrab-flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: ${TZ:-UTC}
    networks:
      - jellygrab-net

  jellygrab:
    # End users: pull a published image from GHCR. Override the tag with
    # SIDECAR_IMAGE in .env to pin a specific release (e.g. ":0.2.0").
    # Developers: `docker compose build` will rebuild from sidecar/Dockerfile
    # and tag the result as this image name.
    image: ${SIDECAR_IMAGE:-ghcr.io/itsomidkarami/jellygrab-sidecar:latest}
    build:
      context: .
      dockerfile: sidecar/Dockerfile
    container_name: jellygrab
    restart: unless-stopped
    depends_on:
      - jellyfin
      - flaresolverr
    ports:
      - "${SIDECAR_PORT:-8765}:8765"
    environment:
      JELLYFIN_URL: ${JELLYFIN_URL:-http://jellyfin:8096}
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY}
      JELLYFIN_USER_ID: ${JELLYFIN_USER_ID}
      DOWNLOAD_DIR: ${DOWNLOAD_DIR:-/media/downloads}
      MOVIES_DIR: ${MOVIES_DIR:-/media/Movies}
      TV_DIR: ${TV_DIR:-/media/TV Shows}
      NAMA_BASE_URL: ${NAMA_BASE_URL:-https://30nama.com}
      NAMA_COOKIE: ${NAMA_COOKIE}
      NAMA_COOKIES_FILE: ${NAMA_COOKIES_FILE:-/secrets/30nama_cookies.json}
      NAMA_USER_AGENT: ${NAMA_USER_AGENT}
      KEEPALIVE_INTERVAL_SEC: ${KEEPALIVE_INTERVAL_SEC:-1800}
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-http://flaresolverr:8191}
    volumes:
      - ${HOST_MEDIA_DIR:-./media}:/media
      - ./secrets:/secrets
    networks:
      - jellygrab-net

networks:
  jellygrab-net:
    driver: bridge
