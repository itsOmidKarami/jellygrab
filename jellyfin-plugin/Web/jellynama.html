<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JellyNama</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101418;
      --panel: #1a2027;
      --panel-2: #232b34;
      --accent: #00a4dc;
      --accent-hover: #1cb8ee;
      --text: #e8eef5;
      --muted: #8a98a8;
      --good: #4caf50;
      --warn: #ff9800;
      --bad: #e53935;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 24px 32px;
      border-bottom: 1px solid #2a323d;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { margin: 0; font-size: 22px; }
    header .tag { color: var(--muted); font-size: 13px; }
    main { padding: 24px 32px; max-width: 1100px; margin: 0 auto; }
    .search-row { display: flex; gap: 12px; margin-bottom: 24px; }
    input[type="search"] {
      flex: 1;
      padding: 12px 16px;
      font-size: 15px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid #2a323d;
      border-radius: 6px;
      outline: none;
    }
    input[type="search"]:focus { border-color: var(--accent); }
    button {
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { background: #3a4754; cursor: not-allowed; }
    button.secondary { background: var(--panel-2); color: var(--text); }
    button.secondary:hover { background: #2e3742; }
    .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 20px;
    }
    .pagination button { padding: 8px 14px; font-size: 13px; }
    .pagination .pagination-label { color: var(--muted); font-size: 13px; }
    .card {
      background: var(--panel);
      border: 1px solid #2a323d;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .poster {
      aspect-ratio: 2 / 3;
      background: #0a0d10 center/cover no-repeat;
    }
    .card-body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card h3 { margin: 0; font-size: 14px; line-height: 1.3; }
    .card .meta { font-size: 12px; color: var(--muted); display: flex; gap: 8px; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 999px;
      font-weight: 600;
    }
    .badge.in-lib { background: rgba(76, 175, 80, 0.18); color: var(--good); }
    .badge.kind { background: var(--panel-2); color: var(--muted); }
    .options { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .options .option-btn,
    .season-options .option-btn {
      padding: 6px 10px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      background: var(--panel-2);
      color: var(--text);
    }
    .options .option-btn:hover,
    .season-options .option-btn:hover { background: #2e3742; }
    .opt-primary { font-weight: 600; }
    .opt-meta { font-size: 10px; color: var(--muted); font-weight: 400; }
    .options-wrapper { display: block; margin-top: 4px; }
    .options-wrapper-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      padding: 6px 8px;
      background: var(--panel-2);
      border-radius: 4px;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }
    .options-wrapper-header::-webkit-details-marker { display: none; }
    .options-wrapper-header::before {
      content: "▸";
      display: inline-block;
      width: 10px;
      margin-right: 6px;
      transition: transform 0.15s ease;
    }
    .options-wrapper[open] > .options-wrapper-header::before { transform: rotate(90deg); }
    .options-wrapper-body { display: flex; flex-direction: column; gap: 6px; padding-top: 6px; }
    .season-group { display: block; }
    .season-header {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 6px 0 2px;
      border-top: 1px solid #2a323d;
      margin-top: 4px;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }
    .season-header::-webkit-details-marker { display: none; }
    .season-header::before {
      content: "▸";
      display: inline-block;
      width: 10px;
      margin-right: 4px;
      transition: transform 0.15s ease;
    }
    .season-group[open] > .season-header::before { transform: rotate(90deg); }
    .season-group:first-child .season-header { border-top: none; margin-top: 0; }
    .season-options { display: flex; flex-direction: column; gap: 4px; padding-top: 4px; }
    .jobs { margin-top: 32px; }
    .jobs-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .jobs h2 { font-size: 16px; margin: 0; color: var(--muted); }
    #clear-jobs { padding: 6px 12px; font-size: 12px; }
    .job {
      background: var(--panel);
      border: 1px solid #2a323d;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .job-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .job-title { font-weight: 600; font-size: 14px; }
    .job-state { font-size: 12px; color: var(--muted); }
    .job-state.completed { color: var(--good); }
    .job-state.failed { color: var(--bad); }
    .job-state.downloading { color: var(--accent); }
    .progress-bar {
      height: 6px;
      background: #0a0d10;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }
    .job-detail { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .empty { color: var(--muted); padding: 32px; text-align: center; }
    .error { color: var(--bad); padding: 12px; background: rgba(229, 57, 53, 0.1); border-radius: 6px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>JellyNama</h1>
    <span class="tag">30nama → Jellyfin</span>
  </header>
  <main>
    <div class="search-row">
      <input id="q" type="search" placeholder="Search 30nama for a movie or series..." autocomplete="off" />
      <button id="search-btn">Search</button>
    </div>
    <div id="error" class="error" hidden></div>
    <div id="results" class="results"></div>
    <div class="jobs">
      <div class="jobs-head">
        <h2>Downloads</h2>
        <button id="clear-jobs" class="secondary">Clear finished</button>
      </div>
      <div id="jobs"></div>
    </div>
  </main>
  <script src="jellynama.js"></script>
</body>
</html>
