overview: "Search configured JellyGrab scrapers and download media into your Jellyfin library."
description: |
  JellyGrab adds a Dashboard page that talks to the JellyGrab FastAPI sidecar
  to search the active scraper, fetch direct download links, queue downloads
  into your Jellyfin media folder, and trigger a library refresh on completion.
