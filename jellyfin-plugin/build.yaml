overview: "Search 30nama.com for Persian movies/series and download them into your Jellyfin library."
description: |
  JellyGrab adds a Dashboard page that talks to the JellyGrab FastAPI sidecar
  to search 30nama.com, fetch direct download links, queue downloads into your
  Jellyfin media folder, and trigger a library refresh on completion.
