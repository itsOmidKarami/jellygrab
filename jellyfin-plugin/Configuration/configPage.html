<!DOCTYPE html>
<html lang="en">
<head>
  <title>JellyNama</title>
</head>
<body>
  <div id="JellyNamaConfigPage"
       data-role="page"
       class="page type-interior pluginConfigurationPage"
       data-require="emby-input,emby-button,emby-collapse">
    <div data-role="content">
      <div class="content-primary">

        <div class="verticalSection">
          <div class="sectionTitleContainer flex align-items-center">
            <h2 class="sectionTitle">JellyNama</h2>
          </div>
          <p class="fieldDescription">
            Search 30nama.com and download directly into your Jellyfin library.
          </p>
        </div>

        <form class="jellyNamaConfigForm">
          <div class="inputContainer">
            <label class="inputLabel inputLabelUnfocused" for="jnSidecarUrl">Sidecar URL</label>
            <input is="emby-input" type="text" id="jnSidecarUrl" required />
            <div class="fieldDescription">
              Where the JellyNama FastAPI sidecar is reachable from your browser
              (e.g. <code>http://localhost:8765</code>). Must be CORS-enabled (the sidecar already is).
            </div>
          </div>
          <button is="emby-button" type="submit" class="raised button-submit block">
            <span>Save</span>
          </button>
        </form>

        <div class="verticalSection" style="margin-top: 2em;">
          <div class="searchRow flex" style="gap: 8px; margin-bottom: 1em;">
            <input is="emby-input" type="search" id="jnSearchQuery"
                   placeholder="Search 30nama for a movie or series..." style="flex:1;" />
            <button is="emby-button" type="button" id="jnSearchBtn" class="raised">
              <span>Search</span>
            </button>
          </div>
          <div id="jnError" class="fieldDescription" style="color: #e53935;" hidden></div>
          <div id="jnResults" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;"></div>
        </div>

        <div class="verticalSection" style="margin-top: 2em;">
          <h3>Downloads</h3>
          <div id="jnJobs"></div>
        </div>

      </div>
    </div>

    <script type="text/javascript">
      (function () {
        const PLUGIN_ID = "3a8d4f2e-7c1b-4e6a-9f8d-2b5e1a9c4d7e";
        const page = document.querySelector("#JellyNamaConfigPage");

        let sidecarUrl = "http://localhost:8765";

        function api(path, opts) {
          return fetch(sidecarUrl.replace(/\/$/, "") + path, Object.assign({
            headers: { "Content-Type": "application/json" }
          }, opts || {})).then(r => {
            if (!r.ok) return r.text().then(t => { throw new Error(r.status + " " + (t || r.statusText)); });
            return r.json();
          });
        }

        function showError(msg) {
          const el = page.querySelector("#jnError");
          if (!msg) { el.hidden = true; return; }
          el.textContent = msg;
          el.hidden = false;
        }

        function escapeHtml(s) {
          return String(s).replace(/[&<>"']/g, c => ({
            "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
          })[c]);
        }

        function formatBytes(n) {
          if (!n) return "0 B";
          const u = ["B","KB","MB","GB","TB"]; let i = 0;
          while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
          return n.toFixed(1) + " " + u[i];
        }

        function renderResults(hits) {
          const root = page.querySelector("#jnResults");
          if (!hits.length) { root.innerHTML = '<p class="fieldDescription">No results.</p>'; return; }
          root.innerHTML = "";
          hits.forEach(h => {
            const card = document.createElement("div");
            card.className = "card";
            card.style.cssText = "background:#1a2027;border:1px solid #2a323d;border-radius:6px;overflow:hidden;display:flex;flex-direction:column;";
            const poster = h.poster ? "background-image:url('" + h.poster + "');background-size:cover;background-position:center;" : "background:#0a0d10;";
            const inLib = h.in_library ? '<span style="background:rgba(76,175,80,0.18);color:#4caf50;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;">In library</span>' : "";
            card.innerHTML =
              '<div style="aspect-ratio:2/3;' + poster + '"></div>' +
              '<div style="padding:10px;display:flex;flex-direction:column;gap:6px;">' +
                '<div style="font-weight:600;font-size:13px;">' + escapeHtml(h.title) + '</div>' +
                '<div style="font-size:11px;color:#8a98a8;">' + (h.year ? escapeHtml(h.year) + ' · ' : '') + h.kind + ' ' + inLib + '</div>' +
                '<div class="jnOpts" data-detail="' + encodeURIComponent(h.detail_url) + '" data-title="' + encodeURIComponent(h.title) + '">' +
                  '<button is="emby-button" type="button" class="raised jnLoadOpts" style="font-size:12px;padding:6px 10px;">Load options</button>' +
                '</div>' +
              '</div>';
            root.appendChild(card);
          });
          root.querySelectorAll(".jnLoadOpts").forEach(btn => {
            btn.addEventListener("click", e => loadOptions(e.currentTarget.parentElement));
          });
        }

        function loadOptions(container) {
          const detail = decodeURIComponent(container.dataset.detail);
          const title = decodeURIComponent(container.dataset.title);
          container.innerHTML = '<span class="fieldDescription">Loading…</span>';
          api("/api/options?detail_url=" + encodeURIComponent(detail))
            .then(opts => {
              if (!opts.length) { container.innerHTML = '<span class="fieldDescription">No links.</span>'; return; }
              container.innerHTML = "";
              opts.forEach(o => {
                const b = document.createElement("button");
                b.setAttribute("is", "emby-button");
                b.type = "button";
                b.className = "raised";
                b.style.cssText = "font-size:11px;padding:4px 8px;margin:2px;";
                b.textContent = o.quality + (o.size ? " · " + o.size : "");
                b.addEventListener("click", () => startDownload(title, o.url, b));
                container.appendChild(b);
              });
            })
            .catch(e => { container.innerHTML = '<span class="fieldDescription">' + escapeHtml(e.message) + '</span>'; });
        }

        function startDownload(title, url, btn) {
          btn.disabled = true;
          btn.textContent = "Queued…";
          api("/api/download", { method: "POST", body: JSON.stringify({ title: title, url: url }) })
            .then(() => { btn.textContent = "Queued ✓"; refreshJobs(); })
            .catch(e => { btn.disabled = false; btn.textContent = "Retry"; showError(e.message); });
        }

        function renderJobs(jobs) {
          const root = page.querySelector("#jnJobs");
          if (!jobs.length) { root.innerHTML = '<p class="fieldDescription">No downloads yet.</p>'; return; }
          root.innerHTML = jobs.map(j => {
            const pct = Math.round((j.progress || 0) * 100);
            const detail = j.state === "downloading"
              ? formatBytes(j.bytes_downloaded) + (j.bytes_total ? " / " + formatBytes(j.bytes_total) : "") + " · " + pct + "%"
              : (j.state === "failed" ? (j.error || "failed") : (j.state === "completed" ? formatBytes(j.bytes_downloaded) : j.state));
            return '<div style="background:#1a2027;border:1px solid #2a323d;border-radius:4px;padding:10px;margin-bottom:6px;">' +
              '<div style="display:flex;justify-content:space-between;font-size:13px;"><span>' + escapeHtml(j.title) + '</span><span style="color:#8a98a8;">' + j.state + '</span></div>' +
              '<div style="height:4px;background:#0a0d10;border-radius:2px;margin:6px 0;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:#00a4dc;"></div></div>' +
              '<div style="font-size:11px;color:#8a98a8;">' + escapeHtml(detail) + '</div>' +
              '</div>';
          }).join("");
        }

        function refreshJobs() { api("/api/jobs").then(renderJobs).catch(() => {}); }

        function search() {
          const q = page.querySelector("#jnSearchQuery").value.trim();
          if (!q) return;
          showError(null);
          page.querySelector("#jnResults").innerHTML = '<p class="fieldDescription">Searching…</p>';
          api("/api/search?q=" + encodeURIComponent(q)).then(renderResults).catch(e => {
            showError("Search failed: " + e.message);
            page.querySelector("#jnResults").innerHTML = "";
          });
        }

        let jobsTimer = null;

        page.addEventListener("viewshow", function () {
          ApiClient.getPluginConfiguration(PLUGIN_ID).then(cfg => {
            sidecarUrl = cfg.SidecarUrl || "http://localhost:8765";
            page.querySelector("#jnSidecarUrl").value = sidecarUrl;
            refreshJobs();
            if (jobsTimer) clearInterval(jobsTimer);
            jobsTimer = setInterval(refreshJobs, 2000);
          });
        });

        page.addEventListener("viewhide", function () {
          if (jobsTimer) { clearInterval(jobsTimer); jobsTimer = null; }
        });

        page.querySelector(".jellyNamaConfigForm").addEventListener("submit", function (e) {
          e.preventDefault();
          Dashboard.showLoadingMsg();
          ApiClient.getPluginConfiguration(PLUGIN_ID).then(cfg => {
            cfg.SidecarUrl = page.querySelector("#jnSidecarUrl").value.trim();
            ApiClient.updatePluginConfiguration(PLUGIN_ID, cfg).then(r => {
              Dashboard.processPluginConfigurationUpdateResult(r);
              sidecarUrl = cfg.SidecarUrl;
            });
          });
          return false;
        });

        page.querySelector("#jnSearchBtn").addEventListener("click", search);
        page.querySelector("#jnSearchQuery").addEventListener("keydown", e => {
          if (e.key === "Enter") { e.preventDefault(); search(); }
        });
      })();
    </script>
  </div>
</body>
</html>
